services:
  apigateway:
    image: hostlistic/apigateway
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "8080:8080"    # Khớp với Nginx proxy_pass
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=hostlistic
      - Jwt__Audience=hostlistic
    depends_on:
      identityservice:
        condition: service_healthy
      eventservice:
        condition: service_healthy
      bookingservice:
        condition: service_healthy
    networks:
      - hostlistic_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - hostlistic_net
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  identityservice:
    image: hostlistic/identityservice
    build:
      context: .
      dockerfile: Services/IdentityService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=${IDENTITY_DB_CONNECTION}
      - ConnectionStrings__RedisConnection=${REDIS_CONNECTION}
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=hostlistic
      - Jwt__Audience=hostlistic
      - CloudinarySettings__CloudName=${CLOUDINARY_CLOUD_NAME}
      - CloudinarySettings__ApiKey=${CLOUDINARY_API_KEY}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
      - ServiceUrls__IdentityService=http://identityservice:8080
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Services__BookingService=http://bookingservice:8080
      - Services__EventService=http://eventservice:8080
      - Services__NotificationService=http://notificationservice:8080
    networks:
      - hostlistic_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  eventservice:
    image: hostlistic/eventservice
    build:
      context: .
      dockerfile: Services/EventService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=${EVENT_DB_CONNECTION}
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=hostlistic
      - Jwt__Audience=hostlistic
      - CloudinarySettings__CloudName=${CLOUDINARY_CLOUD_NAME}
      - CloudinarySettings__ApiKey=${CLOUDINARY_API_KEY}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
      - ServiceUrls__IdentityService=http://identityservice:8080
    networks:
      - hostlistic_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  bookingservice:
    image: hostlistic/bookingservice
    depends_on:
      rabbitmq:
        condition: service_healthy
    build:
      context: .
      dockerfile: Services/BookingService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=${BOOKING_DB_CONNECTION}
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=hostlistic
      - Jwt__Audience=hostlistic
      - CloudinarySettings__CloudName=${CLOUDINARY_CLOUD_NAME}
      - CloudinarySettings__ApiKey=${CLOUDINARY_API_KEY}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
      - PayOs__ClientId=${PAYOS_CLIENT_ID}
      - PayOs__ApiKey=${PAYOS_API_KEY}
      - PayOs__ChecksumKey=${PAYOS_CHECKSUM_KEY}
      - ServiceUrls__EventService=http://eventservice:8080
      - ServiceUrls__NotificationService=http://notificationservice:8080
      - ServiceUrls__IdentityService=http://identityservice:8080
      - FrontendUrl=${FRONTEND_URL}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - QrSecret=${QR_SECRET}
    networks:
      - hostlistic_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  notificationservice:
    depends_on:
      rabbitmq:
        condition: service_healthy
    image: hostlistic/notificationservice
    build:
      context: .
      dockerfile: Services/NotificationService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=${NOTIFICATION_DB_CONNECTION}
      - ConnectionStrings__RedisConnection=${REDIS_CONNECTION}
      - Resend__ApiToken=${RESEND_API_KEY}
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=hostlistic
      - Jwt__Audience=hostlistic
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - Email__DailyLimit=100
    networks:
      - hostlistic_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

  aiservice:
    image: hostlistic/aiservice
    build:
      context: .
      dockerfile: Services/AIService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=${AI_DB_CONNECTION}
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=hostlistic
      - Jwt__Audience=hostlistic
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Gemini__Model=gemini-3-flash-preview
      - ServiceUrls__EventService=http://eventservice:8080
      - ServiceUrls__IdentityService=http://identityservice:8080
    networks:
      - hostlistic_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

  streamingservice:
    image: hostlistic/streamingservice
    build:
      context: .
      dockerfile: Services/StreamingService/StreamingService_Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=${STREAM_DB_CONNECTION}
      - Jwt__Key=${JWT_SECRET_KEY}
      - Jwt__Issuer=hostlistic
      - Jwt__Audience=hostlistic
      - ServiceUrls__EventService=http://eventservice:8080
      - ServiceUrls__IdentityService=http://identityservice:8080
    networks:
      - hostlistic_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

networks:
  hostlistic_net:
    driver: bridge